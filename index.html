<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>よるのふくろう</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black:      #0a0a0f;
      --dark:       #111118;
      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   #8a6f3e;
      --white:      #f0ede6;
      --white-dim:  #b8b4aa;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Noto Serif JP', 'Georgia', serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景の星模様 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(200, 169, 110, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 10%, rgba(200, 169, 110, 0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 43% 55%, rgba(200, 169, 110, 0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 38%, rgba(200, 169, 110, 0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 6%  80%, rgba(200, 169, 110, 0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(200, 169, 110, 0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(200, 169, 110, 0.2) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 65%, rgba(200, 169, 110, 0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* 中央の淡いグロー */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 100vw);
      height: min(600px, 100vh);
      background: radial-gradient(ellipse at center,
        rgba(200, 169, 110, 0.05) 0%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      text-align: center;
      padding: 3.5rem 2.5rem;
    }

    .logo-wrap {
      margin-bottom: 1.6rem;
    }

    .logo-wrap img {
      width: min(220px, 72%);
      height: auto;
      display: block;
      margin: 0 auto;
      mix-blend-mode: screen;
      clip-path: circle(50%);
      filter: sepia(1) saturate(1.3) brightness(0.88) drop-shadow(0 0 18px rgba(200, 169, 110, 0.6));
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0 auto 1.4rem;
      max-width: 220px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }
    .divider-icon {
      color: var(--gold);
      font-size: 0.6rem;
    }

    .tagline {
      font-size: clamp(0.8rem, 2.5vw, 0.9rem);
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 2rem;
    }

    .bio {
      font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      color: var(--white-dim);
      line-height: 2.5;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      text-align: center;
      padding: 1.2rem 0;
    }

    .sns-section {
      display: flex;
      justify-content: center;
    }

    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--white-dim);
      font-size: clamp(0.8rem, 2.5vw, 0.88rem);
      letter-spacing: 0.12em;
      padding: 0.6rem 1.4rem;
      border: 1px solid rgba(200, 169, 110, 0.25);
      border-radius: 1px;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .sns-link:hover {
      color: var(--gold-light);
      border-color: rgba(200, 169, 110, 0.6);
      background: rgba(200, 169, 110, 0.06);
    }

    .sns-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: rgba(200, 169, 110, 0.3);
    }

    /* ページ周囲の金色フレーム */
    .page-frame {
      position: fixed;
      inset: 14px;
      border: 1px solid rgba(200, 169, 110, 0.18);
      pointer-events: none;
      z-index: 100;
    }

    .page-frame .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(200, 169, 110, 0.7);
      border-style: solid;
    }
    .page-frame .corner.tl { top: -1px;  left: -1px;  border-width: 2px 0 0 2px; }
    .page-frame .corner.tr { top: -1px;  right: -1px; border-width: 2px 2px 0 0; }
    .page-frame .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
    .page-frame .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* 各辺中央のダイヤモンド装飾 */
    .page-frame .mid {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(200, 169, 110, 0.5);
      transform: rotate(45deg);
    }
    .page-frame .mid.top    { top: -3px;  left: 50%; margin-left: -3px; }
    .page-frame .mid.bottom { bottom: -3px; left: 50%; margin-left: -3px; }
    .page-frame .mid.left   { left: -3px; top: 50%;  margin-top: -3px; }
    .page-frame .mid.right  { right: -3px; top: 50%; margin-top: -3px; }

    .sp-br { display: none; }

    @media (max-width: 480px) {
      .card {
        padding: 2.5rem 1.5rem;
      }
      .page-frame {
        inset: 8px;
      }
      .page-frame .corner {
        width: 18px;
        height: 18px;
      }
      .sp-br { display: initial; }
    }
  </style>
</head>
<body>

  <!-- ページ周囲の金色フレーム -->
  <div class="page-frame" aria-hidden="true">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <span class="mid top"></span>
    <span class="mid bottom"></span>
    <span class="mid left"></span>
    <span class="mid right"></span>
  </div>

  <main class="card">
    <div class="logo-wrap">
      <img src="BCO.b813d9bb-00a7-4de9-ad4e-00fc5fa4627a.png" alt="よるのふくろう">
    </div>

    <div class="divider">
      <span class="divider-icon">✦</span>
    </div>

    <p class="tagline">作家・クリエイター</p>

    <div class="bio">
      <p>生きた証として、<br class="sp-br">言葉を綴り、<br class="sp-br">モノを作っています。</p>
      <p>夜の静けさの中で、<br class="sp-br">ひとつひとつ丁寧に。</p>
      <p>つくることは、<br class="sp-br">存在することです。</p>
    </div>

    <div class="sns-section">
      <a class="sns-link" href="https://x.com/Night_Owl_2960" target="_blank" rel="noopener noreferrer">
        <!-- X (旧Twitter) ロゴ -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.732-8.835L1.254 2.25H8.08l4.258 5.63 5.906-5.63Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        @Night_Owl_2960
      </a>
    </div>
  </main>

  <footer>© 2026 よるのふくろう</footer>

</body>
</html>
